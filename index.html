<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas de Proyecto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <main class="container mt-5">
        <h1 id="tituloPrincipal" class="text-center mb-4">Gestor de Tareas de Proyecto</h1>

        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Agregar nueva tarea</h2>

                <form id="formularioTarea">
                    <div class="mb-3">
                        <label for="nombreTarea" class="form-label">Nombre de la tarea</label>
                        <input type="text" id="nombreTarea" class="form-control" placeholder="Ejemplo: Diseñar pantalla principal">
                    </div>

                    <div class="mb-3">
                        <label for="prioridadTarea" class="form-label">Prioridad</label>
                        <select id="prioridadTarea" class="form-select">
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Agregar</button>
                </form>
            </div>
        </section>

        <section class="card shadow-sm">
            <div class="card-body">
                <h2 class="h5 mb-3">Listado de tareas</h2>

                <table id="tablaTareas" class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Tarea</th>
                            <th>Prioridad</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>

    <!-- JS propio -->
    <script src="js/script.js"></script>
</body>
</html>
